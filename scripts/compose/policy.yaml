atomic_primitive: skills

core:
  - richgo/skill-machine/skills/review-orchestrator
  - richgo/skill-machine/skills/diff-analysis

fallback:
  - richgo/skill-machine/skills/correctness
  - richgo/skill-machine/skills/code-quality

signals:
  python:
    patterns:
      - "*.py"
      - "requirements.txt"
      - "pyproject.toml"
    dependencies:
      - richgo/skill-machine/skills/lang-python
  typescript:
    patterns:
      - "*.ts"
      - "*.tsx"
      - "package.json"
    dependencies:
      - richgo/skill-machine/skills/lang-typescript
  ci_github_actions:
    patterns:
      - ".github/workflows/"
    dependencies:
      - richgo/skill-machine/skills/inline-comments
