name: autoresearch-tuning

"on":
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      skills:
        description: Comma-separated skills to tune
        required: false
        type: string
      models:
        description: Comma-separated models to tune
        required: false
        type: string
      run_id:
        description: Optional run id override
        required: false
        type: string
  push:
    paths:
      - evals/**
      - skills/**

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Generate matrix plan
        id: generate
        run: |
          SKILLS_PREFIX=$([[ "${{ github.event_name }}" == "schedule" ]] && echo "--skills-prefix security-" || echo "")
          MATRIX=$(python scripts/tune/orchestrator.py \
            --trigger "${{ github.event_name }}" \
            --run-id "${{ github.run_id }}" \
            --skills "${{ github.event.inputs.skills }}" \
            --models "${{ github.event.inputs.models }}" \
            --output-format github-matrix \
            $SKILLS_PREFIX)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  tune_pair:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    concurrency:
      group: autoresearch-${{ matrix.skill }}-${{ matrix.model }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Run pair tuning
        run: |
          python scripts/tune/autoresearch.py \
            --skill "skills/${{ matrix.skill }}/SKILL.md" \
            --evals "evals/${{ matrix.skill }}.json" \
            --model "${{ matrix.model }}" \
            --history-file "tune-history/${{ matrix.skill }}/${{ matrix.model }}.jsonl"

  promote:
    needs: [plan, tune_pair]
    strategy:
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/autoresearch-promote.yml
    with:
      skill: ${{ matrix.skill }}
      model: ${{ matrix.model }}
      run_id: ${{ github.run_id }}
      base_branch: main
